name: Feature request
description: Propose a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: search existing issues to see if this has already been requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you're running into. A user story works well here.
      placeholder: "As a user who runs multiple local models, I want to … so that …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, references, or anything else relevant.
